{% extends 'main/base.html' %}
{% load static %}

{% block content %}

<!-- ================================
     CUSTOM STYLES
================================ -->
<style>

    /* ================================
       GLOBAL / BACKGROUND
    ================================= */
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
    }

    body {
        background: 
            linear-gradient(rgba(2,6,23,0.75), rgba(15,23,42,0.85)),
            url("{% static 'images/background.jpg' %}") no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
        color: #fff;
        overflow-x: hidden;
    }


    /* ================================
       HERO SECTION (LAYOUT)
    ================================= */
    .hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 60px;
        gap: 50px;
        flex-wrap: wrap;
    }


    /* ================================
       HERO LEFT (TEXT AREA)
    ================================= */
    .hero-left {
        flex: 1;
        min-width: 300px;
    }

    .hero-left h1 {
        font-size: 3rem;
        font-weight: bold;
        animation: fadeInDown 1.5s ease;
    }

    .hero-left h1 span {
        color: #00f2fe;
    }

    .hero-left p {
        font-size: 1.3rem;
        margin-top: 10px;
        animation: fadeInUp 1.5s ease;
    }

    .typing {
        color: #4facfe;
        font-weight: bold;
    }


    /* ================================
       BUTTONS
    ================================= */
    .btn-custom {
        margin-top: 25px;
        padding: 12px 28px;
        border-radius: 30px;
        border: none;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        color: #fff;
        font-size: 1rem;
        transition: 0.3s;
    }

    .btn-custom:hover {
        transform: scale(1.1);
        background: #2c2c2c;
        box-shadow: 0 0 20px rgba(0,242,254,0.4);
    }


    /* ================================
       HERO RIGHT (CONTACT AREA)
    ================================= */
    .hero-right {
        flex: 1;
        min-width: 300px;
        display: flex;
        justify-content: center;
    }


    /* ================================
       CONTACT BOX (GLASS UI)
    ================================= */
    .contact-box {
        width: 100%;
        max-width: 400px;
        padding: 30px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        background: rgba(255,255,255,0.05);
        box-shadow: 0 0 30px rgba(0,0,0,0.3);
        animation: fadeInUp 1.5s ease;
    }

    .contact-box h2 {
        text-align: center;
    }

    /* inputs */
    .contact-box input,
    .contact-box textarea {
        width: 100%;
        margin-bottom: 15px;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.1);
        color: #fff;
    }

    /* button */
    .contact-box button {
        width: 100%;
        padding: 12px;
        border-radius: 25px;
        border: none;
        background: linear-gradient(90deg, #4facfe, #00f2fe);
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .contact-box button:hover {
        background: #222;
        transform: scale(1.05);
    }


    /* ================================
       FLOATING ELEMENTS
    ================================= */
    .floating {
        position: absolute;
        width: 200px;
        opacity: 0.15;
        animation: float 6s infinite ease-in-out;
    }

    .floating:nth-child(1) { top: 10%; left: 5%; }
    .floating:nth-child(2) { bottom: 10%; right: 5%; }


    /* ================================
       ANIMATIONS
    ================================= */
    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-40px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }


    /* ================================
       RESPONSIVE DESIGN
    ================================= */
    @media(max-width: 768px) {
        .hero {
            flex-direction: column;
            text-align: center;
        }
    }
/* ================================
   HERO TEXT EFFECTS (3 DIFFERENT)
================================ */

/* 1. NAME (MAIN HEADING) */
.hero-left h1 span {
    background: linear-gradient(90deg, #38bdf8, #00f2fe, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        2px 2px 10px rgba(0,0,0,0.4),
        0 0 20px rgba(56,189,248,0.7);

    display: inline-block;
    transition: 0.4s ease;
}

/* 

/* 2. TYPING TEXT */
.typing {
    background: linear-gradient(90deg, #f472b6, #ec4899, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        1px 1px 8px rgba(0,0,0,0.3),
        0 0 15px rgba(236,72,153,0.6);

    transition: 0.3s ease;
}

.typing:hover {
    transform: scale(1.1);
    text-shadow:
        0 0 25px rgba(236,72,153,0.9),
        0 0 40px rgba(168,85,247,0.8);
}


/* 3. SUBTEXT (PARAGRAPH) */
.hero-left p {
    font-size: 1.3rem;
    margin-top: 10px;

    background: linear-gradient(90deg, #22c55e, #4ade80);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    text-shadow:
        1px 1px 6px rgba(0,0,0,0.3),
        0 0 10px rgba(34,197,94,0.5);

    transition: 0.3s ease;
}

.hero-left p:hover {
    transform: translateY(-3px) scale(1.05);
    text-shadow:
        0 0 20px rgba(34,197,94,0.8),
        0 0 30px rgba(74,222,128,0.7);
}
</style>


<!-- ================================
     HERO SECTION
================================ -->
<div class="hero">

    <!-- LEFT SIDE -->
    <div class="hero-left">
        <h1>Hello, I'm <span>Shyalima Sony</span></h1>

        <p>
            I'm a <span class="typing" id="typing"></span>
        </p>

        <a href="{% url 'projects' %}">
            <button class="btn-custom">🚀 View My Work</button>
        </a>
    </div>


    <!-- RIGHT SIDE (CONTACT FORM) -->
    <div class="hero-right">
        <div class="contact-box">

            <h2>Contact Me</h2>

            <form method="POST">
                {% csrf_token %}
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea rows="4" name="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>

        </div>
    </div>

</div>


<!-- ================================
     OPTIONAL FLOATING IMAGES
================================ -->

<img src="{% static 'images/background.webp' %}" class="floating">
<img src="{% static 'images/background.webp' %}" class="floating">
-->


<!-- ================================
     TYPING EFFECT SCRIPT
================================ -->
<script>

    const roles = [
        "Python Full Stack Developer",
        "Django Developer",
        "Front-End Developer",
        "Web Designer",
        "HTML/CSS Developer"
    ];

    let i = 0, j = 0, isDeleting = false;

    function typeEffect() {
        let text = roles[i];
        document.getElementById("typing").innerHTML = text.substring(0, j);

        if (!isDeleting) j++;
        else j--;

        if (j === text.length) {
            isDeleting = true;
            setTimeout(typeEffect, 1000);
            return;
        }

        if (j === 0) {
            isDeleting = false;
            i = (i + 1) % roles.length;
        }

        setTimeout(typeEffect, isDeleting ? 50 : 100);
    }

    typeEffect();

</script>

{% endblock %}
