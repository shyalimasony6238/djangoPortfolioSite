{% extends 'main/base.html' %}
{% load static %}

{% block content %}

<style>

/* ===== BACKGROUND ===== */
html, body {
    height: 100%;
    margin: 0;
}

body {
    background: 
        linear-gradient(rgba(2,6,23,0.75), rgba(15,23,42,0.85)),
        url("{% static 'images/background.jpg' %}") no-repeat center center fixed;
    background-size: cover;
    color: #fff;
}

/* ===== HERO LAYOUT ===== */
.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 60px;
    gap: 50px;
}

/* ===== LEFT TEXT ===== */
.hero-left {
    flex: 1;
    min-width: 300px;
}

.hero-left h1 {
    font-size: 3rem;
    font-weight: bold;
}

.hero-left h1 span {
    background: linear-gradient(90deg, #38bdf8, #00f2fe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero-left p {
    font-size: 1.3rem;
    margin-top: 10px;
}

.typing {
    color: #4facfe;
    font-weight: bold;
}

/* ===== BUTTON ===== */
.btn-custom {
    margin-top: 25px;
    padding: 12px 28px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    color: #fff;
    transition: 0.3s;
}

.btn-custom:hover {
    transform: scale(1.1);
}

/* ===== RIGHT FORM ===== */
.hero-right {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== GLASS FORM ===== */
.contact-box {
    width: 100%;
    max-width: 420px;
    padding: 35px;
    border-radius: 20px;

    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);

    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    transition: 0.4s;
}

.contact-box:hover {
    transform: translateY(-8px) scale(1.02);
}

.contact-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUTS */
.contact-box input,
.contact-box textarea {
    width: 100%;
    margin-bottom: 15px;
    padding: 12px;

    border-radius: 12px;
    border: none;

    background: rgba(255,255,255,0.1);
    color: #fff;
}

.contact-box input:focus,
.contact-box textarea:focus {
    outline: none;
    box-shadow: 0 0 10px #38bdf8;
}

/* BUTTON */
.contact-box button {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    border: none;

    background: linear-gradient(90deg, #38bdf8, #00f2fe);
    color: #fff;
    cursor: pointer;
}

.contact-box button:hover {
    transform: scale(1.05);
}

/* ===== RESPONSIVE ===== */
@media(max-width: 768px) {

    .hero {
        flex-direction: column;
        text-align: center;
        padding: 30px 15px;
    }

    .hero-right {
        width: 100%;
    }

    .contact-box {
        max-width: 350px;
        margin-top: 20px;
    }
}

</style>

<!-- ===== HERO ===== -->
<div class="hero">

    <!-- LEFT -->
    <div class="hero-left">
        <h1>Hello, I'm <span>Shyalima Sony</span></h1>

        <p>I'm a <span id="typing"></span></p>

        <a href="{% url 'projects' %}">
            <button class="btn-custom">🚀 View My Work</button>
        </a>
    </div>

    <!-- RIGHT (FORM) -->
    <div class="hero-right">
        <div class="contact-box">

            <h2>Contact Me</h2>

            <form method="POST">
                {% csrf_token %}
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea rows="4" name="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>

        </div>
    </div>

</div>

<!-- ===== TYPING EFFECT ===== -->
<script>
const roles = [
    "Python Full Stack Developer",
    "Django Developer",
    "Frontend Developer",
    "Web Designer"
];

let i = 0, j = 0, isDeleting = false;

function typeEffect() {
    let text = roles[i];
    document.getElementById("typing").innerHTML = text.substring(0, j);

    if (!isDeleting) j++;
    else j--;

    if (j === text.length) {
        isDeleting = true;
        setTimeout(typeEffect, 1000);
        return;
    }

    if (j === 0) {
        isDeleting = false;
        i = (i + 1) % roles.length;
    }

    setTimeout(typeEffect, isDeleting ? 50 : 100);
}

typeEffect();
</script>

{% endblock %}
