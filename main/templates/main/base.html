<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <!-- ===== CSS LIBRARIES ===== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- ===== CUSTOM STYLES ===== -->
    <style>

        /* ================================
           GLOBAL STYLES
        ================================= */
        body {
            margin: 0;
            padding: 0;
        }


        /* ================================
           NAVBAR
        ================================= */
        .navbar {
            background: rgba(15, 23, 42, 0.75) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 22px;
            color: #38bdf8 !important;
            letter-spacing: 1px;
        }


        /* ================================
           NAV LINKS
        ================================= */
        .nav-link {
            position: relative;
            margin: 0 12px;
            font-weight: 500;
            transition: all 0.4s ease;
            display: inline-block;
            perspective: 600px;
        }

        .nav-link:hover {
            transform: 
                rotateX(18deg)
                rotateY(18deg)
                scale(1.25)
                translateY(-6px);

            color: #38bdf8 !important;

            text-shadow:
                0 6px 20px rgba(56,189,248,0.7),
                0 0 25px rgba(56,189,248,0.6),
                0 0 40px rgba(14,165,233,0.5);

            animation: float 0.6s ease forwards;
        }

        /* underline effect */
        .nav-link::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -6px;
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            transform: translateX(-50%);
            transition: 0.4s ease;
            box-shadow: 0 0 10px #38bdf8;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* floating animation */
        @keyframes float {
            0% {
                transform: translateY(0) rotateX(0) rotateY(0);
            }
            100% {
                transform: translateY(-6px) rotateX(18deg) rotateY(18deg);
            }
        }


        /* ================================
           MAIN CONTENT
        ================================= */
        .main-content {
            margin-top: 30px;
        }


        /* ================================
           FOOTER
        ================================= */
        footer {
            margin-top: 40px;
            padding: 20px 0;
            color: #fff;
        }

        .social-icon {
            font-size: 22px;
            margin: 0 12px;
            color: #fff;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            color: #38bdf8;
            transform: scale(1.3) translateY(-5px);
            text-shadow: 0 0 15px rgba(56,189,248,0.8);
        }

    </style>
</head>


<body>

    <!-- ================================
         NAVBAR
    ================================= -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">

            <a class="navbar-brand" href="/">MyPortfolio</a>

            <div>
                <a class="nav-link d-inline text-white" href="/">Home</a>
                <a class="nav-link d-inline text-white" href="/about/">About</a>
                <a class="nav-link d-inline text-white" href="/projects/">Projects</a>
                <a class="nav-link d-inline text-white" href="/contact/">Contact</a>
            </div>

        </div>
    </nav>


    <!-- ================================
         MAIN CONTENT
    ================================= -->
    <div class="container main-content">
        {% block content %}{% endblock %}
    </div>


    <!-- ================================
         FOOTER
    ================================= -->
    <footer class="text-center">

        <p>Connect with me:</p>

        <a href="https://linkedin.com/in/shyalimasony0522" target="_blank">
            <i class="fab fa-linkedin social-icon"></i>
        </a>

        <a href="https://github.com/shyalimasony6238" target="_blank">
            <i class="fab fa-github social-icon"></i>
        </a>

    </footer>

</body>
</html>
