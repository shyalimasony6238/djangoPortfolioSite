<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ===== GLOBAL ===== */
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #020617, #0f172a, #020617, #1e293b);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== BUBBLES ===== */
        .bubbles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        .bubbles span {
            position: absolute;
            bottom: -120px;
            border-radius: 50%;
            background: rgba(56, 189, 248, 0.3);
            animation: rise linear infinite;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.6),
                        0 0 20px rgba(56, 189, 248, 0.4),
                        0 0 40px rgba(56, 189, 248, 0.3);
        }

        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translateY(-120vh); opacity: 0; }
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: rgba(15, 23, 42, 0.75) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 22px;
            color: #38bdf8 !important;
            letter-spacing: 1px;
        }

        /* ===== NAV LINKS (UPDATED - NO LINE) ===== */
        .nav-link {
            margin: 0 12px;
            font-weight: 500;
            display: inline-block;
            transition: all 0.25s ease;
        }

        .nav-link:hover {
            transform: translateY(-2px);
            color: #38bdf8 !important;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.6);
        }

        /* ❌ REMOVE LINE EFFECT */
        .nav-link::after {
            display: none !important;
        }

        /* ===== MAIN ===== */
        .main-content {
            margin-top: 30px;
            color: #fff;
        }

        /* ===== FOOTER ===== */
        footer {
            margin-top: 40px;
            padding: 20px 0;
            color: #fff;
        }

        .social-icon {
            font-size: 22px;
            margin: 0 12px;
            color: #fff;
            transition: all 0.3s ease;
        }

        .social-icon:hover {
            color: #38bdf8;
            transform: scale(1.3) translateY(-5px);
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.8);
        }

        /* Desktop → inline */
        .nav-links a {
            display: inline-block;
        }

        /* Mobile → vertical */
        @media (max-width: 991px) {
            .nav-links {
                width: 100%;
                text-align: center;
                margin-top: 10px;
            }

            .nav-links a {
                display: block;
                padding: 10px 0;
            }
        }
    </style>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <!-- 🔵 BUBBLES -->
    <div class="bubbles">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">

            <a class="navbar-brand" href="/">MyPortfolio</a>

            <!-- Hamburger -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse justify-content-end" id="navMenu">
                <div class="nav-links">
                    <a class="nav-link text-white" href="/">Home</a>
                    <a class="nav-link text-white" href="/about/">About</a>
                    <a class="nav-link text-white" href="/projects/">Projects</a>
                    <a class="nav-link text-white" href="/contact/">Contact</a>
                </div>
            </div>

        </div>
    </nav>

    <!-- ===== MAIN ===== -->
    <div class="container main-content">
        {% block content %}
        <h2 class="text-center mt-5">🔥 Welcome to My Portfolio</h2>
        {% endblock %}
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="text-center">
        <p>Connect with me:</p>
        <a href="https://linkedin.com/in/shyalimasony0522" target="_blank">
            <i class="fab fa-linkedin social-icon"></i>
        </a>
        <a href="https://github.com/shyalimasony6238" target="_blank">
            <i class="fab fa-github social-icon"></i>
        </a>
    </footer>

</body>
</html>
